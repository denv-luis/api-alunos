<!DOCTYPE html>
<html>
<head>
    <title>API de Alunos</title>
</head>
<body>

    <h1>Cadastro de Alunos</h1>

    <input type="text" id="nome" placeholder="Nome do aluno">
    <input type="text" id="notas" placeholder="Notas (ex: 7,8,9)">
    <button onclick="adicionarAluno()">Adicionar</button>

    <h2>Lista de Alunos</h2>
    <ul id="lista"></ul>

    <script>
    const API_URL = "https://api-alunos-puwk.onrender.com";

    async function adicionarAluno() {
        const nome = document.getElementById("nome").value;
        const notasInput = document.getElementById("notas").value;

        if(!nome || !notasInput) {
            alert("Preencha todos os campos!");
            return;
        }

        const notas = notasInput.split(",").map(n => parseFloat(n));

        try {
            const response = await fetch(`${API_URL}/alunos` , {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    nome: nome,
                    notas: notas
                })
            });
            if (!response.ok) {
                throw new Error("Erro ao adcionar aluno");
            }
            alert("Aluno adcionado com sucesso!");

            carregarAlunos();

        } catch (error) {
            console.error(error);
            alert("Erro ao conectar com a API");
        }
    }

    </script>

</body>
</html>
